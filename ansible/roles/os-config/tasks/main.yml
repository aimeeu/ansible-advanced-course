---
# tasks file for dependencies
- name: Install web app dependencies
  become: true
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  with_items:
    - python3
    - python3-setuptools
    - python3-dev
    - build-essential
    - python3-pip
    - python3-pymysql
    - pkg-config
    - libmysqlclient-dev
